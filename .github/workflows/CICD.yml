name: CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "This is the environment where this runs"
        default: dev
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet
        run: echo "Hello from VINIT 👋"

  code:
    needs: greet
    runs-on: ubuntu-latest
    steps:
      - name: Code stage
        run: echo "Running code stage"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build stage
        run: echo "Building application"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test stage
        run: echo "Running tests"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stage
        run: |
          echo "Deploying to environment: ${{ inputs.environment }} 🚀"
