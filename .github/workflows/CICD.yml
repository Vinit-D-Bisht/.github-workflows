name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet
        run: echo "Hello from VINIT 👋"

  code:
    needs: greet
    runs-on: ubuntu-latest
    steps:
      - name: Code stage
        run: echo "Running code stage"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build stage
        run: echo "Building application"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test stage
        run: echo "Running tests"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stage
        run: echo "Deploying application 🚀"
